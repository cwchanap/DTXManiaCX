name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g. v1.2.3). Defaults to a dev version.'
        required: false
        type: string

# One release pipeline per tag at a time. Cancel in-flight runs for the same
# tag so re-publishing a release doesn't race on asset uploads.
concurrency:
  group: release-${{ github.event.release.tag_name || github.event.inputs.tag || github.run_id }}
  cancel-in-progress: false

permissions: {}

jobs:
  windows-installer:
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          # For release events this defaults to the published tag; for
          # workflow_dispatch we must explicitly check out inputs.tag so a
          # manual rerun of an older tag builds that tag's source, not the
          # default branch. Empty (no tag input) falls back to the default
          # branch for dev builds.
          ref: ${{ github.event.release.tag_name || github.event.inputs.tag }}

      - name: Normalize version from tag
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag || 'v0.0.0-dev' }}
        run: |
          $tag = "$env:RELEASE_TAG"
          $version = $tag -replace '^v', ''
          if (-not $version) { throw "Could not normalize version from tag '$tag'" }
          # APP_VERSION flows into Inno Setup /D defines, sed substitutions and
          # Info.plist XML. Reject anything outside [A-Za-z0-9.+-] so a tag like
          # 'release/v1.2.3' (contains '/') or one with '&'/'<' can't break the
          # installer build or corrupt the plist.
          if ($version -notmatch '^[A-Za-z0-9.+-]+$') {
            throw "Invalid version '$version' (from tag '$tag'): allowed chars are [A-Za-z0-9.+-]"
          }
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Release tag: $tag; normalized version: $version"

      - name: Setup .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore DTXMania.Game/DTXMania.Game.Windows.csproj

      - name: Publish self-contained (win-x64)
        run: >
          dotnet publish DTXMania.Game/DTXMania.Game.Windows.csproj
          -c Release -r win-x64 --self-contained
          -p:PublishReadyToRun=false -p:TieredCompilation=false
          -o ./publish/win

      - name: Verify OFL font license files in publish output
        shell: pwsh
        run: |
          # The SIL Open Font License requires every redistributed copy to
          # include the copyright notice and license text. The .csproj copies
          # them to Licenses/ via None + CopyToOutputDirectory. Fail the build
          # if either file is missing from the publish output.
          $licenses = @(
            'publish/win/Licenses/Orbitron-OFL.txt',
            'publish/win/Licenses/ShareTechMono-OFL.txt'
          )
          foreach ($f in $licenses) {
            if (-not (Test-Path $f)) { throw "Missing OFL license file: $f" }
            Write-Host "Found: $f"
          }

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Setup Python for pack validation
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Validate CX Neon pack completeness and integrity
        shell: pwsh
        run: |
          # Two complementary gates run before staging (see tools/README.md):
          #
          # 1. skingen/sfxgen validate — integrity: every manifest asset exists
          #    on disk, decodes as an image/audio file, and matches the expected
          #    dimensions. CxNeonPackTests only checks File.Exists, so without
          #    this gate a corrupt or wrong-dimension image would ship and fall
          #    back at runtime.
          # 2. CxNeonPackTests — completeness: every entry in
          #    TexturePath.GetAllTexturePaths() and SoundPath.GetAllSoundPaths()
          #    exists, including manifest-optional-but-code-referenced assets
          #    that skingen validate skips.
          #
          # Both self-skip when the pack is absent (no System/CXNeon/Graphics).
          if (-not (Test-Path 'System/CXNeon/Graphics') -or -not (Test-Path 'System/CXNeon/Sounds')) {
            Write-Host 'CX Neon pack not yet produced — skipping pack validation.'
            exit 0
          }
          # $ErrorActionPreference does not propagate to native commands in
          # pwsh, so a non-zero exit from pip/choco/python/dotnet would be
          # silently swallowed and the step would succeed. Mirror the macOS
          # leg (shell: bash, where `set -e` is the GitHub Actions default)
          # by checking $LASTEXITCODE after every native invocation. Without
          # this, skingen.py validate could exit 1 on a corrupt image while
          # CxNeonPackTests (File.Exists only) passes and a broken asset ships.
          pip install "Pillow>=10,<12"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          # sfxgen validate decodes every OGG via ffmpeg; ensure a full
          # OGG/Vorbis-capable build is on PATH before running it.
          choco install ffmpeg -y --no-progress
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python tools/skingen/skingen.py validate
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python tools/sfxgen/sfxgen.py validate
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet test DTXMania.Test/DTXMania.Test.csproj `
            --configuration Release `
            --filter 'FullyQualifiedName~CxNeonPackTests' `
            --verbosity normal
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Stage base System skin (flatten CX Neon; fail if pack is missing)
        shell: pwsh
        run: |
          # Flatten the CX Neon pack into the base System layout the
          # ResourceManager expects (Graphics/, Sounds/, Theme.ini at the System
          # root) and pass the staging dir to Inno Setup via SystemSkinDir.
          #
          # Fail-closed: the CX Neon pack is complete and committed, so a missing
          # Graphics/ or Sounds/ is a real regression, not an interim state. The
          # prior ::warning:: fallback shipped repo-root System\ — which contains
          # NX/GITADORA-derived assets the project no longer has rights to
          # redistribute — and was only acceptable while the pack was being
          # produced. Produce the pack via tools/skingen/ and tools/sfxgen/ before
          # cutting a release.
          $dest = Join-Path $PWD 'publish\system-skin'
          if (-not (Test-Path 'System/CXNeon/Graphics') -or -not (Test-Path 'System/CXNeon/Sounds')) {
            $missing = @()
            if (-not (Test-Path 'System/CXNeon/Graphics')) { $missing += 'Graphics' }
            if (-not (Test-Path 'System/CXNeon/Sounds'))   { $missing += 'Sounds' }
            throw "CX Neon pack incomplete ($($missing -join ', ') missing under System/CXNeon/). Refusing to ship repo-root System\ (NX/GITADORA-derived assets). Produce the pack via tools/skingen/ and tools/sfxgen/ before releasing."
          }
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Path 'System/CXNeon/Graphics' -Destination "$dest/Graphics" -Recurse -Force
          Copy-Item -Path 'System/CXNeon/Sounds'   -Destination "$dest/Sounds"   -Recurse -Force
          Copy-Item -Path 'System/CXNeon/Theme.ini' -Destination "$dest/Theme.ini" -Force
          "SYSTEM_SKIN_DIR=$dest" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Staged base System skin at: $dest"

      - name: Compile installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found at $iscc" }
          # SourceDir MUST be absolute: Inno Setup resolves Source: paths relative
          # to the .iss file's directory (installer/windows/), not the ISCC cwd.
          # SystemSkinDir is the staged base System skin (see previous step).
          $sourceDir = Join-Path $PWD "publish\win"
          & $iscc /DMyAppVersion="$env:APP_VERSION" "/DSourceDir=$sourceDir" "/DSystemSkinDir=$env:SYSTEM_SKIN_DIR" "installer\windows\dtxmania.iss"

      - name: Upload installer artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: dtxmania-windows-installer-${{ env.APP_VERSION }}
          path: installer/windows/Output/DTXMania-Setup-${{ env.APP_VERSION }}.exe

      - name: Attach installer to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: installer/windows/Output/DTXMania-Setup-${{ env.APP_VERSION }}.exe

  mac-installer:
    # Pin to macos-15 (Apple Silicon / arm64) instead of macos-latest. This
    # job publishes an arm64-only .app bundle and builds FFmpeg from source
    # for the host architecture (./configure passes no --arch flag), so an
    # x64 runner would produce x86_64 binaries that the arm64 guard below
    # rejects — only after wasting the full FFmpeg build. macos-15 is arm64,
    # stable, and not deprecated (unlike macos-14, whose deprecation started
    # 2026-07-06). macos-latest is mid-transition to macos-26 (rollout
    # 2026-06-15 through 2026-07-15), so avoid the alias until it settles.
    runs-on: macos-15
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          # See windows-installer job: check out inputs.tag on manual runs so
          # the built source matches the version label.
          ref: ${{ github.event.release.tag_name || github.event.inputs.tag }}

      - name: Normalize version from tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag || 'v0.0.0-dev' }}
        run: |
          tag="$RELEASE_TAG"
          version="${tag#v}"
          if [ -z "$version" ]; then echo "Could not normalize version from tag '$tag'" >&2; exit 1; fi
          # APP_VERSION flows into sed substitutions and Info.plist XML. Reject
          # anything outside [A-Za-z0-9.+-] so a tag like 'release/v1.2.3'
          # (contains '/') or one with '&'/'<' can't break the sed delimiter or
          # corrupt the plist.
          if [[ ! "$version" =~ ^[A-Za-z0-9.+-]+$ ]]; then
            echo "Invalid version '$version' (from tag '$tag'): allowed chars are [A-Za-z0-9.+-]" >&2
            exit 1
          fi
          echo "APP_VERSION=$version" >> "$GITHUB_ENV"
          echo "Release tag: $tag; normalized version: $version"

      - name: Setup .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore DTXMania.Game/DTXMania.Game.Mac.csproj

      - name: Smoke test build-dmg.sh (fast-fail on script regression)
        run: |
          chmod +x installer/macos/build-dmg.sh installer/macos/test-build-dmg.sh
          bash installer/macos/test-build-dmg.sh

      - name: Publish self-contained (osx-arm64)
        run: >
          dotnet publish DTXMania.Game/DTXMania.Game.Mac.csproj
          -c Release -r osx-arm64 --self-contained
          -p:PublishReadyToRun=false -p:TieredCompilation=false
          -o ./publish/mac

      - name: Verify OFL font license files in publish output
        run: |
          # The SIL Open Font License requires every redistributed copy to
          # include the copyright notice and license text. The .csproj copies
          # them to Licenses/ via None + CopyToOutputDirectory. Fail the build
          # if either file is missing from the publish output.
          for f in publish/mac/Licenses/Orbitron-OFL.txt publish/mac/Licenses/ShareTechMono-OFL.txt; do
            if [ ! -f "$f" ]; then echo "::error::Missing OFL license file: $f" >&2; exit 1; fi
            echo "Found: $f"
          done

      - name: Build native arm64 ffmpeg (MP3 decode)
        run: |
          # The MMTools.Executables.MacOS.X64 NuGet package only bundles an
          # x86_64 ffmpeg that requires Rosetta 2 on Apple Silicon. Build a
          # minimal native arm64 ffmpeg/ffprobe so MP3-backed songs work
          # without Rosetta. ManagedSound checks runtimes/osx-arm64/MMTools
          # before falling back to the x64 Rosetta path.
          #
          # Minimal configure: only the mp3 decoder, pcm_s16le encoder,
          # s16le muxer, and the protocols/filters needed by FFMpegCore's
          # MP3-to-PCM pipeline (see ManagedSound.LoadMp3File).
          FFMPEG_VERSION=7.0.2
          # SHA256 of https://ffmpeg.org/releases/ffmpeg-7.0.2.tar.xz,
          # verified against the official tarball on 2026-07-09.
          FFMPEG_TARBALL_SHA256=8646515b638a3ad303e23af6a3587734447cb8fc0a0c064ecdb8e95c4fd8b389
          curl -fsSL "https://ffmpeg.org/releases/ffmpeg-${FFMPEG_VERSION}.tar.xz" \
            -o /tmp/ffmpeg.tar.xz
          printf '%s  %s\n' "$FFMPEG_TARBALL_SHA256" /tmp/ffmpeg.tar.xz \
            > /tmp/ffmpeg.tar.xz.sha256
          shasum -a 256 -c /tmp/ffmpeg.tar.xz.sha256
          tar xJf /tmp/ffmpeg.tar.xz -C /tmp
          cd "/tmp/ffmpeg-${FFMPEG_VERSION}"
          ./configure \
            --prefix=/tmp/ffmpeg-arm64 \
            --enable-static --disable-shared \
            --disable-doc --disable-htmlpages --disable-manpages \
            --disable-podpages --disable-txtpages \
            --disable-ffplay \
            --disable-everything \
            --enable-decoder=mp3float \
            --enable-demuxer=mp3 \
            --enable-parser=mpegaudio \
            --enable-protocol=file,pipe \
            --enable-muxer=s16le \
            --enable-encoder=pcm_s16le \
            --enable-filter=aformat,anull,aresample
          make -j"$(sysctl -n hw.ncpu)"
          make install
          DEST="${GITHUB_WORKSPACE}/publish/mac/runtimes/osx-arm64/MMTools"
          mkdir -p "$DEST"
          cp /tmp/ffmpeg-arm64/bin/ffmpeg  "$DEST/ffmpeg"
          cp /tmp/ffmpeg-arm64/bin/ffprobe "$DEST/ffprobe"
          chmod +x "$DEST/ffmpeg" "$DEST/ffprobe"
          echo "Built arm64 ffmpeg:" && file "$DEST/ffmpeg" "$DEST/ffprobe"
          # Hard fail if the produced binaries are not arm64. This release ships an
          # arm64-only .app bundle, so an x86_64 ffmpeg/ffprobe would either force
          # Rosetta 2 or fail outright on Apple Silicon. The job is pinned to
          # macos-15 (an Apple Silicon runner) so configure builds for arm64 by
          # default; this guard catches any future change to the runner image or
          # to the configure flags without silently shipping a non-native build.
          #
          # Use `file -b` (bare mode) so the output contains only the Mach-O type
          # description and NOT the destination path, which itself contains
          # "osx-arm64" and would otherwise make the grep match the directory name
          # instead of the binary architecture.
          #
          # Validate each binary independently. A single combined `file ... | grep`
          # would pass as long as EITHER binary is arm64, letting a mixed pair
          # (e.g. arm64 ffmpeg + x86_64 ffprobe) slip through. ManagedSound.LoadMp3File
          # invokes FFProbe before ffmpeg, so a non-native ffprobe breaks MP3 playback
          # on Apple Silicon systems without Rosetta 2.
          for bin in "$DEST/ffmpeg" "$DEST/ffprobe"; do
            if ! file -b "$bin" | grep -qi 'arm64'; then
              echo "::error::$(basename "$bin") is not an arm64 Mach-O binary; refusing to ship a non-native build." >&2
              file "$bin" >&2
              exit 1
            fi
          done

      - name: Setup Python for pack validation
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Validate CX Neon pack completeness and integrity
        run: |
          # Two complementary gates run before staging (see tools/README.md):
          #
          # 1. skingen/sfxgen validate — integrity: every manifest asset exists
          #    on disk, decodes as an image/audio file, and matches the expected
          #    dimensions. CxNeonPackTests only checks File.Exists, so without
          #    this gate a corrupt or wrong-dimension image would ship and fall
          #    back at runtime.
          # 2. CxNeonPackTests — completeness: every entry in
          #    TexturePath.GetAllTexturePaths() and SoundPath.GetAllSoundPaths()
          #    exists, including manifest-optional-but-code-referenced assets
          #    that skingen validate skips.
          #
          # Both self-skip when the pack is absent (no System/CXNeon/Graphics).
          # Mirrors the build-and-test.yml bundle leg.
          if [ ! -d "System/CXNeon/Graphics" ] || [ ! -d "System/CXNeon/Sounds" ]; then
            echo "CX Neon pack not yet produced — skipping pack validation."
            exit 0
          fi
          pip install "Pillow>=10,<12"
          # sfxgen validate decodes every OGG via ffmpeg. The arm64 ffmpeg built
          # earlier for the .app is MP3-only (--disable-everything) and ships to
          # publish/mac/... off PATH, so install a full OGG/Vorbis-capable ffmpeg
          # here. Without it, _decode_ok fail-closes and every sound is rejected.
          brew install ffmpeg
          python tools/skingen/skingen.py validate
          python tools/sfxgen/sfxgen.py validate
          dotnet test DTXMania.Test/DTXMania.Test.Mac.csproj \
            --configuration Release \
            --filter 'FullyQualifiedName~CxNeonPackTests' \
            --verbosity normal

      - name: Stage base System skin (flatten CX Neon; fail if pack is missing)
        run: |
          # Flatten the CX Neon pack into the base System layout the
          # ResourceManager expects (Graphics/, Sounds/, Theme.ini at the System
          # root) and pass the staging dir to build-dmg.sh.
          #
          # Fail-closed: the CX Neon pack is complete and committed, so a missing
          # Graphics/ or Sounds/ is a real regression, not an interim state. The
          # prior ::warning:: fallback shipped repo-root System/ — which contains
          # NX/GITADORA-derived assets the project no longer has rights to
          # redistribute — and was only acceptable while the pack was being
          # produced. Produce the pack via tools/skingen/ and tools/sfxgen/ before
          # cutting a release. Mirrors the windows-installer leg.
          if [ ! -d "System/CXNeon/Graphics" ] || [ ! -d "System/CXNeon/Sounds" ]; then
            missing=""
            [ ! -d "System/CXNeon/Graphics" ] && missing="Graphics"
            [ ! -d "System/CXNeon/Sounds" ]   && missing="${missing:+$missing, }Sounds"
            echo "::error::CX Neon pack incomplete (${missing:-unknown} missing under System/CXNeon/). Refusing to ship repo-root System/ (NX/GITADORA-derived assets). Produce the pack via tools/skingen/ and tools/sfxgen/ before releasing." >&2
            exit 1
          fi
          dest="$PWD/publish/system-skin"
          mkdir -p "$dest"
          cp -R System/CXNeon/Graphics "$dest/Graphics"
          cp -R System/CXNeon/Sounds   "$dest/Sounds"
          cp System/CXNeon/Theme.ini   "$dest/Theme.ini"
          echo "SYSTEM_SKIN_DIR=$dest" >> "$GITHUB_ENV"
          echo "Staged base System skin at: $dest"

      - name: Build .app bundle and DMG
        run: |
          test -x ./publish/mac/runtimes/osx-arm64/MMTools/ffmpeg
          test -x ./publish/mac/runtimes/osx-arm64/MMTools/ffprobe
          bash installer/macos/build-dmg.sh \
            ./publish/mac \
            "$SYSTEM_SKIN_DIR" \
            "$APP_VERSION" \
            DTXMania.Game/Icon.ico \
            ./output

      - name: Upload DMG artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: dtxmania-macos-dmg-${{ env.APP_VERSION }}
          path: output/DTXMania-${{ env.APP_VERSION }}-arm64.dmg

      - name: Attach DMG to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: output/DTXMania-${{ env.APP_VERSION }}-arm64.dmg
