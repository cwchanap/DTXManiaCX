name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v7
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    
    - name: Restore dependencies
      run: dotnet restore DTXMania.Game/DTXMania.Game.Windows.csproj

    - name: Build Windows project
      run: dotnet build DTXMania.Game/DTXMania.Game.Windows.csproj --configuration Debug --no-restore

    - name: Run tests on Windows
      env:
        ALSOFT_DRIVERS: 'null'
      run: dotnet test DTXMania.Test/DTXMania.Test.csproj --configuration Debug --verbosity normal --logger trx --results-directory ./TestResults /p:CollectCoverage=true /p:CoverletOutput=./TestResults/Coverage/ /p:CoverletOutputFormat=cobertura /p:IncludeTestAssembly=false /p:Exclude="[DTXMania.Test*]*"

    - name: Upload test results
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: test-results-windows
        path: ./TestResults

    - name: Locate coverage report
      shell: pwsh
      if: always()
      run: |
        $candidatePaths = @(
          "TestResults/coverage.cobertura.xml",
          "TestResults/Coverage/coverage.cobertura.xml",
          "DTXMania.Test/TestResults/coverage.cobertura.xml",
          "DTXMania.Test/TestResults/Coverage/coverage.cobertura.xml"
        )

        $coveragePath = $candidatePaths |
          ForEach-Object { Join-Path $PWD $_ } |
          Where-Object { Test-Path $_ } |
          Select-Object -First 1

        if ($coveragePath) {
          "CODECOV_FILE=$coveragePath" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Coverage report found: $coveragePath"
        }
        else {
          Write-Warning "coverage.cobertura.xml not found in TestResults. Skipping Codecov upload."
        }

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v7
      if: always() && env.CODECOV_FILE != ''
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ${{ env.CODECOV_FILE }}
        flags: unit,windows
        fail_ci_if_error: false
        verbose: true

  build-and-test-macos:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v7
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    
    - name: Restore dependencies
      run: dotnet restore DTXMania.Game/DTXMania.Game.Mac.csproj

    - name: Build Mac project
      run: dotnet build DTXMania.Game/DTXMania.Game.Mac.csproj --configuration Debug --no-restore

    - name: Run tests on macOS
      run: dotnet test DTXMania.Test/DTXMania.Test.Mac.csproj --configuration Debug --no-build --verbosity normal --collect:"XPlat Code Coverage" --settings ./coverlet.runsettings --results-directory ./TestResults --logger trx

    - name: Locate coverage report on macOS
      if: always()
      shell: bash
      run: |
        coverage_file=$(find TestResults DTXMania.Test/TestResults -type f -name "coverage.cobertura.xml" 2>/dev/null | head -n 1 || true)
        if [ -n "$coverage_file" ]; then
          echo "Coverage report found: $coverage_file"
        else
          echo "::warning::coverage.cobertura.xml not found in macOS TestResults directories."
        fi

    - name: Upload test results
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: test-results-macos
        path: ./TestResults

  gameplay-e2e-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-e2e-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore Windows game
      run: dotnet restore DTXMania.Game/DTXMania.Game.Windows.csproj

    - name: Restore E2E project
      run: dotnet restore DTXMania.E2E/DTXMania.E2E.csproj --runtime win-x64

    - name: Build Windows game
      run: dotnet build DTXMania.Game/DTXMania.Game.Windows.csproj --configuration Debug --no-restore

    - name: Run gameplay E2E smoke
      env:
        ALSOFT_DRIVERS: 'null'
        DTXMANIA_E2E_GAME_PROJECT: DTXMania.Game/DTXMania.Game.Windows.csproj
        DTXMANIA_E2E_ARTIFACT_ROOT: TestResults/e2e
      run: dotnet test DTXMania.E2E/DTXMania.E2E.csproj --configuration Debug --verbosity normal --logger trx --results-directory ./TestResults/e2e --filter "Category=E2E"

    - name: Run E2E support tests
      run: dotnet test DTXMania.E2E/DTXMania.E2E.csproj --configuration Debug --verbosity normal --logger trx --results-directory ./TestResults/e2e-support --filter "Category=E2E-Support"

    - name: Upload gameplay E2E artifacts
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: gameplay-e2e-windows
        path: ./TestResults/e2e

  build-artifacts:
    runs-on: ${{ matrix.os }}
    needs: [build-and-test-windows, build-and-test-macos]
    if: github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        include:
          - os: windows-latest
            project: DTXMania.Game/DTXMania.Game.Windows.csproj
            output: windows
            artifact: dtxmania-windows
          - os: macos-latest
            project: DTXMania.Game/DTXMania.Game.Mac.csproj
            output: macos
            artifact: dtxmania-macos
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v7
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore ${{ matrix.project }}
    
    - name: Build Release
      run: dotnet build ${{ matrix.project }} --configuration Release --no-restore
    
    - name: Publish
      run: dotnet publish ${{ matrix.project }} --configuration Release --output ./publish/${{ matrix.output }} --no-restore --self-contained false

    - name: Setup Python for pack validation
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: '3.11'

    - name: Validate CX Neon pack is complete
      shell: bash
      run: |
        # Skip validation when the pack has not been produced yet (matches the
        # vacuous-pass behavior of CxNeonPackTests). Once System/CXNeon/Graphics
        # exists, the pack must be complete or this step fails.
        if [ ! -d "System/CXNeon/Graphics" ]; then
          echo "CX Neon pack not yet produced — skipping validation."
          exit 0
        fi
        pip install Pillow
        python tools/skingen/skingen.py validate
        python tools/sfxgen/sfxgen.py validate

    - name: Bundle CX Neon skin as the base System skin
      shell: bash
      run: |
        # Skip bundling when the pack has not been produced yet (matches the
        # vacuous-pass behavior of CxNeonPackTests and the validate step above).
        # Once System/CXNeon/Graphics exists, the bundle must succeed or this
        # step fails.
        if [ ! -d "System/CXNeon/Graphics" ]; then
          echo "CX Neon pack not yet produced — skipping bundle."
          exit 0
        fi
        dest="./publish/${{ matrix.output }}/System"
        mkdir -p "$dest"
        cp -R System/CXNeon/Graphics "$dest/Graphics"
        cp -R System/CXNeon/Sounds "$dest/Sounds"
        cp System/CXNeon/Theme.ini "$dest/Theme.ini"

    - name: Assert no NX-derived assets in the release
      shell: bash
      run: |
        # The only System content allowed in the artifact is what we just
        # copied from System/CXNeon. Fail if anything else snuck in.
        # Skip when the CX Neon pack was not bundled (see previous step).
        system_dir="./publish/${{ matrix.output }}/System"
        if [ ! -d "$system_dir" ]; then
          echo "No System dir in release artifact — skipping NX-asset assertion."
          exit 0
        fi
        unexpected=$(cd "$system_dir" && find . -type f | while read -r f; do
          [ -f "$GITHUB_WORKSPACE/System/CXNeon/${f#./}" ] || echo "$f"
        done)
        if [ -n "$unexpected" ]; then
          echo "Unexpected System files in release artifact:"; echo "$unexpected"; exit 1
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.artifact }}-${{ github.sha }}
        path: ./publish/${{ matrix.output }}
