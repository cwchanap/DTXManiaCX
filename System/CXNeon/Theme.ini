; CX Neon — original DTXManiaCX skin theme.
; All keys are optional; the game falls back to built-in (NX-layout) defaults.
; Sections organize the file; lookup is by bare key.

[Palette]
; One light source rules this skin: the cyan horizon band in the backdrops,
; sampled at hue 188. The accent below IS that light. The neutral ramp is tuned
; to the same hue family (193) rather than a blue-grey, so type reads as lit by
; the scene instead of pasted over it, and each step is placed by contrast ratio
; against the lit horizon zone — the hardest background in the skin — not by eye:
;   TextPrimary   12.0:1   headline / live status
;   TextSecondary  7.5:1   values a player actually reads
;   TextTertiary   4.8:1   supporting copy, inactive states
;   TextFaint      3.4:1   footnotes; the floor, never go below it
UI.TextPrimary=#DBEBF0
UI.TextSecondary=#A4BEC5
UI.TextTertiary=#7A99A1
UI.TextFaint=#647E85
UI.Accent=#22D3EE
UI.AccentSecondary=#E879F9
UI.Success=#2BD18F
UI.Danger=#E9453A

[Layout]
; Whitelisted layout overrides are added here as draw sites adopt theme support.
; Startup (loading) screen. NX pins a white 14px serif console to three corners
; and leaves the middle of the frame empty. CX Neon builds one centred group on
; the x=640 axis, seated below the backdrop's horizon glow (y~360): the live
; status line, a thin neon rail, then a step/percent ledger tied to the rail's
; two ends. The phase log demotes to a dim column on a 40px margin and the
; version becomes a footnote in the opposite corner, so the two secondary blocks
; balance on a diagonal. Only two type sizes are in play (14 body / 18 status) —
; hierarchy comes from colour and position rather than size jumps.
; Two voices: Share Tech Mono carries the log, ledger and version footnote (a
; fixed-width telemetry face, so the percentage does not reflow as it counts),
; while the live status line keeps the Orbitron display face shared with the
; rest of the skin.
Startup.TextFontFamily=ShareTechMono
Startup.TextFontSize=14
Startup.StatusFontFamily=Orbitron
Startup.StatusFontSize=18
Startup.LogX=40
Startup.LogY=36
Startup.LogLineHeight=20
Startup.LogText=#7A99A1
Startup.StatusCenterX=640
Startup.StatusY=448
Startup.StatusText=#DBEBF0
Startup.StatusMaxWidth=560
Startup.ProgressBarWidth=560
Startup.ProgressBarHeight=8
Startup.ProgressBarY=492
Startup.ProgressBarBack=#334155
Startup.ProgressBarFill=#22D3EE
Startup.ProgressReadoutY=510
Startup.ProgressReadoutText=#A4BEC5
Startup.VersionRightX=1240
Startup.VersionY=664
Startup.VersionText=#647E85
; CX Neon's selected bar body spans rows 20..96 of the 640x96 texture (abs
; 259..335); the NX artist position (y=320, full-size text) crosses its bottom
; border, so the name is raised and shrunk to sit inside the panel body.
SongSelect.ArtistNameY=312
SongSelect.ArtistNameScale=0.75
; Inactive tabs / status messages sit on the tertiary step; the active tab
; picks up UI.Accent, so the live item is the only lit thing in the strip.
SongSelect.TabInactive=#7A99A1
SongSelect.StatusText=#7A99A1
; The NX vertical separator strip (4_item bar.png at x=400) crosses the CX
; menu panel's right border; the framed inner board already separates the
; regions, so the strip parks off-screen.
Config.ItemBarX=-100
; SongTransition: the NX plate backdrop is opaque gray, which clashes with the
; dark panel language; use the translucent navy panel tone instead. The title
; caps at 430px so long names stop short of the rotated jacket (x~620) that
; draws over them — the full title always shows, shrinking slightly and/or
; wrapping to a second row inside that cap. Latin titles/artists render in the
; Orbitron display face; CJK text keeps the serif automatically.
Transition.DifficultyPanel=#0F172AB4
Transition.TitleMaxWidth=430
Transition.TitleFontFamily=Orbitron
Transition.TitleFontSize=40
Transition.ArtistFontFamily=Orbitron
Transition.ArtistFontSize=24
Transition.LevelFontFamily=Orbitron
Transition.LevelFontSize=24
; Performance stage: NX shares 7_SkillPanel.png between the play and result
; screens, but its baked LEVEL/PLAY rows sit exactly where the play screen
; draws the difficulty badge + level digits. CX ships a play-specific sheet
; without those rows (small LEVEL/RATE captions instead). The centered
; LOADING.../READY... text uses the display face.
Performance.SkillPanelTexture=Graphics/7_SkillPanel_perf.png
Performance.StateFontFamily=Orbitron
Performance.StateFontSize=32
; Song select: tab strip in the display face; the status panel's bitmap
; numbers (BPM / length / total notes) draw at 1.3x from a 2x-authored digit
; sheet so they stay crisp.
SongSelect.TabFontFamily=Orbitron
SongSelect.TabFontSize=18
SongSelect.StatusNumberScale=1.3
; RECENT PLAYS rows are date / result / rank / score columns, so they take the
; monospace telemetry face at its native 14px (NX scaled the UI serif to 0.8,
; which left them the only serif text on a screen of display type).
SongSelect.HistoryFontFamily=ShareTechMono
SongSelect.HistoryFontSize=14
SongSelect.HistoryTextScale=1.0
SongSelect.HistoryText=#A4BEC5
; Never-played songs would otherwise park an empty captioned frame over the
; song wheel.
SongSelect.HideEmptyHistoryPanel=true
; Result screen typography: numeric values (score/counts/percents/level/skills)
; render with the Orbitron display family — the same face as the baked panel
; labels — at 18px (values) and 14px (counts). Song title/artist keep the
; CJK-capable NotoSerifJP (24px asset drawn at 75% for the title). FAILED
; still uses the 24px serif banner font.
Result.ValueFontFamily=Orbitron
Result.FontValue=18
Result.FontValueSmall=14
Result.FontNormal=24
Result.FontNormalScale=75
Result.FontLarge=24
Result.ScoreText=#22D3EE
; Ledger alignment: labels are left-aligned in the panel art, so every value
; right-aligns against a shared edge (panel body 182..435, 14px padding).
; Percents form a second right-aligned column; counts stop short of it.
Result.ValueRightX=421
Result.CountRightX=336
Result.PercentRightX=421
; Counts carry their baked label colour exactly. That ledger is a ramp, not a
; rainbow: luminance descends with tier quality (PERFECT 12:1 down to MISS
; 4.8:1) so the eye reads top-down, and the hues are pulled onto the skin's
; cyan/magenta axis. MISS keeps its saturation instead of washing out pale.
; Percents drop to the tertiary step so the counts read first.
Result.PerfectText=#F7CA41
Result.GreatText=#2BD18F
Result.GoodText=#71A7E6
Result.PoorText=#DF5AE4
Result.MissText=#E9453A
Result.ComboText=#22D3EE
Result.PercentText=#7A99A1
; Orbitron-14 digit centers sit ~12px below the draw point vs ~14.5px for the
; serif 14px asset; +3 keeps each count centered on its 22px label box.
Result.CountYOffset=3
; The borderless jacket panel (349x380) shares the skill panel's top edge
; (y=260) and extends past the 245px preview (bottom 556) so its dark body
; doubles as the caption scrim for the title/artist below.
Result.JacketPanelY=260
Result.JacketPreviewY=311
; Title/artist form a centered caption inside the jacket panel's footer on the
; same x=640 axis as the banner and jacket (NX left-aligns both at x=500).
; The artist drops one step below the title so it reads on the dark scrim
; without competing.
Result.TitleCenterX=640
Result.TitleY=566
Result.ArtistCenterX=640
Result.ArtistY=600
Result.ArtistText=#A4BEC5
; Value rows center on their baked label boxes: Orbitron-18 digit centers sit
; ~15.6px below the draw point (label centers: SCORE 293, LEVEL 541, PLAY 571,
; SKILL 648).
Result.ScoreY=277
Result.LevelY=525
Result.PlayingSkillY=555
Result.GameSkillY=632
; Difficulty-tier name (BASIC/MASTER/...) annotates the level value on the
; tertiary step, right-aligned short of the numeric column.
Result.LevelLabelRightX=340
Result.LevelLabelText=#7A99A1
; CX Neon result layout: the NX plate slot (315,100) and 274px rank badge
; (480,0) overlap each other, and the NX score floats alone at the top-left.
; Rearranged: clear plate becomes a top-center banner, the rank badge moves to
; the empty top-right zone, and the score becomes the skill panel's header row
; (SCORE label baked into 7_SkillPanel.png; value right-aligned like the rest).
Result.PlateX=340
Result.PlateY=30
Result.RankBadgeX=980
Result.RankBadgeY=25
; NEW RECORD strip (90x12) centers in the gap between the score header and the
; judgement rows (NX (298,582) lands inside the CX panel's LEVEL/PLAY footer).
Result.NewRecordX=264
Result.NewRecordY=318
; FAILED text centers in the (empty) plate banner slot for failed runs.
Result.FailedTextX=601
Result.FailedTextY=100

[Fonts]
; Bitmap-font cell metrics are declared here when CX Neon fonts deviate from NX cells.
