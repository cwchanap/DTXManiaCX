; CX Neon — original DTXManiaCX skin theme.
; All keys are optional; the game falls back to built-in (NX-layout) defaults.
; Sections organize the file; lookup is by bare key.

[Palette]
UI.TextPrimary=#F1F5F9
UI.Accent=#22D3EE
UI.AccentSecondary=#E879F9
UI.Success=#22C55E
UI.Danger=#EF4444

[Layout]
; Whitelisted layout overrides are added here as draw sites adopt theme support.
; CX Neon's selected bar body spans rows 20..96 of the 640x96 texture (abs
; 259..335); the NX artist position (y=320, full-size text) crosses its bottom
; border, so the name is raised and shrunk to sit inside the panel body.
SongSelect.ArtistNameY=312
SongSelect.ArtistNameScale=0.75
; Slate for inactive tabs / status messages; active tabs pick up UI.Accent.
SongSelect.TabInactive=#64748B
SongSelect.StatusText=#94A3B8
; The NX vertical separator strip (4_item bar.png at x=400) crosses the CX
; menu panel's right border; the framed inner board already separates the
; regions, so the strip parks off-screen.
Config.ItemBarX=-100
; SongTransition: the NX plate backdrop is opaque gray, which clashes with the
; dark panel language; use the translucent navy panel tone instead. The title
; caps at 430px so long names stop short of the rotated jacket (x~620) that
; draws over them.
Transition.DifficultyPanel=#0F172AB4
Transition.TitleMaxWidth=430
; Result screen typography: numeric values (score/counts/percents/level/skills)
; render with the Orbitron display family — the same face as the baked panel
; labels — at 18px (values) and 14px (counts). Song title/artist keep the
; CJK-capable NotoSerifJP (24px asset drawn at 75% for the title). FAILED
; still uses the 24px serif banner font.
Result.ValueFontFamily=Orbitron
Result.FontValue=18
Result.FontValueSmall=14
Result.FontNormal=24
Result.FontNormalScale=75
Result.FontLarge=24
Result.ScoreText=#22D3EE
; Ledger alignment: labels are left-aligned in the panel art, so every value
; right-aligns against a shared edge (panel body 182..435, 14px padding).
; Percents form a second right-aligned column; counts stop short of it.
Result.ValueRightX=421
Result.CountRightX=336
Result.PercentRightX=421
; Row styling: counts tinted to their baked label colors, percents dimmed
; slate so the primary counts read first.
Result.PerfectText=#FACC15
Result.GreatText=#22C55E
Result.GoodText=#3B82F6
Result.PoorText=#E879F9
Result.MissText=#EF4444
Result.ComboText=#22D3EE
Result.PercentText=#94A3B8
; Orbitron-14 digit centers sit ~12px below the draw point vs ~14.5px for the
; serif 14px asset; +3 keeps each count centered on its 22px label box.
Result.CountYOffset=3
; The borderless jacket panel (349x380) shares the skill panel's top edge
; (y=260) and extends past the 245px preview (bottom 556) so its dark body
; doubles as the caption scrim for the title/artist below.
Result.JacketPanelY=260
Result.JacketPreviewY=311
; Title/artist form a centered caption inside the jacket panel's footer on the
; same x=640 axis as the banner and jacket (NX left-aligns both at x=500).
; The slate artist tone reads on the dark scrim without competing with the
; white title.
Result.TitleCenterX=640
Result.TitleY=566
Result.ArtistCenterX=640
Result.ArtistY=600
Result.ArtistText=#CBD5E1
; Value rows center on their baked label boxes: Orbitron-18 digit centers sit
; ~15.6px below the draw point (label centers: SCORE 293, LEVEL 541, PLAY 571,
; SKILL 648).
Result.ScoreY=277
Result.LevelY=525
Result.PlayingSkillY=555
Result.GameSkillY=632
; CX Neon result layout: the NX plate slot (315,100) and 274px rank badge
; (480,0) overlap each other, and the NX score floats alone at the top-left.
; Rearranged: clear plate becomes a top-center banner, the rank badge moves to
; the empty top-right zone, and the score becomes the skill panel's header row
; (SCORE label baked into 7_SkillPanel.png; value right-aligned like the rest).
Result.PlateX=340
Result.PlateY=30
Result.RankBadgeX=980
Result.RankBadgeY=25
; NEW RECORD strip (90x12) centers in the gap between the score header and the
; judgement rows (NX (298,582) lands inside the CX panel's LEVEL/PLAY footer).
Result.NewRecordX=264
Result.NewRecordY=318
; FAILED text centers in the (empty) plate banner slot for failed runs.
Result.FailedTextX=601
Result.FailedTextY=100

[Fonts]
; Bitmap-font cell metrics are declared here when CX Neon fonts deviate from NX cells.
